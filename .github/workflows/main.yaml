name: Hello World Pipeline
on:
  push:
    branches: [ main ]
 
 
jobs:
  init-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js (placeholder)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
 
      - name: Initialize worker (placeholder)
        run: |
          echo "Initialize worker - placeholder"
 
      - name: Install Cloud Foundry CLI v8
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp
          # Download latest stable CF CLI v8 linux64 binary
          curl -fsSL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" -o cf8.tgz
          tar -xzf cf8.tgz
          # The tar contains 'cf8' binary; install as 'cf'
          sudo mv cf8 /usr/local/bin/cf
          sudo chmod +x /usr/local/bin/cf
          cf version
 
         
      - name: Cloud Foundry login
        env:
          CF_API: ${{ secrets.CF_API }}
          CF_USERNAME: ${{ secrets.CF_USERNAME }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
          CF_ORG: ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_API" ]; then
            echo "CF_API secret is not set. Skipping cf login.";
            exit 0
          fi
          cf api "$CF_API" --skip-ssl-validation || cf api "$CF_API"
          if [ -n "$CF_USERNAME" ] && [ -n "$CF_PASSWORD" ]; then
            echo "Logging in with username/password"
            cf auth "$CF_USERNAME" "$CF_PASSWORD"
          elif [ -n "$CF_API_TOKEN" ]; then
            echo "Logging in with API token"
            cf auth "$CF_API_TOKEN"
          else
            echo "No CF credentials provided. Set secrets CF_USERNAME/CF_PASSWORD or CF_API_TOKEN.";
            exit 1
          fi
          if [ -n "$CF_ORG" ]; then
            cf target -o "$CF_ORG" -s "$CF_SPACE" || true
          fi
         
      - name: Setup Node.js (UI5-compatible)
        uses: actions/setup-node@v4
        with:
         node-version: '20.11.1'   # UI5 CLI v4 needs >= 20.11
         cache: 'npm'
 
 
      - name: Install UI5 CLI (global)
        run: |
          npm i -g @ui5/cli@^4
          ui5 --version
 
      - name: Install MBT (MTA Builder)
        run: |
          npm i -g mbt@^1.2.34 --unsafe-perm
          mbt --version

 
      - name: Build the mta file
        run: mbt build
 
       
      - name: Install CF MultiApps plugin (for cf deploy)
        shell: bash
        run: |
          set -euo pipefail
          # Add the official plugin index (if not already present)
          if ! cf list-plugin-repos | grep -q "^CF-Community"; then
            cf add-plugin-repo CF-Community https://plugins.cloudfoundry.org
          fi
          # Install the multiapps plugin (provides `cf deploy`, `cf mta-*` commands)
          cf install-plugin -r CF-Community multiapps -f
          cf plugins
 
 
     
      - name: Deploy to Cloud Foundry
        shell: bash
        run: cf deploy mta_archives/incident-management_1.0.0.mtar --retries 3
 
 
 
      - name: Delete the generated mta file (optional)
        run: ls