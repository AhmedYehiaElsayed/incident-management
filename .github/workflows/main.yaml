name: SAP CAP HANA Deploy Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy-cap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Cloud Foundry CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo tee /etc/apt/trusted.gpg.d/cf.asc
          echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install -y cf8-cli

      - name: Cloud Foundry Login
        run: |
          cf api "${{ secrets.CF_API }}"
          cf auth "${{ secrets.CF_USERNAME }}" "${{ secrets.CF_PASSWORD }}"
          cf target -o "${{ secrets.CF_ORG }}" -s "${{ secrets.CF_SPACE }}"
          cf target

      - name: Install MBT (Multi-Target Build Tool)
        run: npm install -g mbt
      
      - name: Install UI5 CLI
        run: npm install -g @ui5/cli
        
      - name: Build CAP Project (MTA)
        run: mbt build

      - name: Deploy MTA Archive
        run: |
          cf deploy mta_archives/incident-management_1.0.0.mtar

      - name: List Deployed Apps
        run: cf apps