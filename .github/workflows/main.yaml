name: Hello World Pipeline
on:
  push:
    branches: [main]
 
jobs:
  init-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js (placeholder)
        uses: actions/setup-node@v4
        with:
          node-version: "18"
 
      - name: Initialize worker (placeholder)
        run: |
          echo "Initialize worker - placeholder"
 
      - name: Install Cloud Foundry CLI (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg ca-certificates
          wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
          echo 'deb https://packages.cloudfoundry.org/debian stable main' | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install -y cf-cli || true
 
      - name: Cloud Foundry login
        env:
          CF_API: ${{ secrets.CF_API }}
          CF_USERNAME: ${{ secrets.CF_USERNAME }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
          CF_ORG: ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_API" ]; then
            echo "CF_API secret is not set. Skipping cf login.";
            exit 0
          fi
          cf api "$CF_API" --skip-ssl-validation || cf api "$CF_API"
          if [ -n "$CF_USERNAME" ] && [ -n "$CF_PASSWORD" ]; then
            echo "Logging in with username/password"
            cf auth "$CF_USERNAME" "$CF_PASSWORD"
          elif [ -n "$CF_API_TOKEN" ]; then
            echo "Logging in with API token"
            cf auth "$CF_API_TOKEN"
          else
            echo "No CF credentials provided. Set secrets CF_USERNAME/CF_PASSWORD or CF_API_TOKEN.";
            exit 1
          fi
          if [ -n "$CF_ORG" ]; then
            cf target -o "$CF_ORG" -s "$CF_SPACE" || true
          fi
      - name: Get Apps
        run: |
          cf apps
 